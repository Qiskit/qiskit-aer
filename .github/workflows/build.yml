name: Build
on:
  push:
    branches: [main, 'stable/*']
  pull_request:
    branches: [main, 'stable/*']
concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.head_ref }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["macos-15-intel", "ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python Python '3.13'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
        if: runner.os == 'Windows'
      - name: Install deps
        run: python -m pip install -U cibuildwheel==3.2.1
      - name: Build Wheels
        env:
          AER_CMAKE_OPENMP_BUILD: 1
        run: cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: artifact-${{ matrix.os }}
  wheel-arm64:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["macos-latest"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: arm64
      - name: Install deps
        run: python -m pip install -U cibuildwheel==3.2.1
      - name: Build Wheels
        env:
          CIBW_ARCHS_MACOS: arm64
          CIBW_BEFORE_BUILD: | # conan<2.0.0 on arm64 (turns to be 1.66.0) complains about not supporting Clang 17
            python -m pip install "conan<2.0.0"
            conan config init --force
            sed -i '' 's/"16.0"/"16.0", "17.0"/' ~/.conan/settings.yml
        run: cibuildwheel --output-dir wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          path: ./wheelhouse/*.whl
          name: artifact-${{ github.job }}
