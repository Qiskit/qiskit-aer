---
upgrade:
  - |
    GitHub Actions workflow files have been brought into a consistent state.
    Notable cleanups (none of these change functional behaviour from a user's
    perspective):

    * Removed three calls to ``actions-rs/toolchain@v1`` in
      ``.github/workflows/deploy.yml`` (aarch64, s390x, and ppc64le wheel
      jobs).  Aer is a C++/Python project; the Rust toolchain set-up was
      vestigial and unused.
    * Bumped the ppc64le wheel job from ``pypa/cibuildwheel@v2.19.2`` to
      ``@v3.2.1``, matching the version every other cibuildwheel job in
      this repository already uses.
    * Bumped ``actions/checkout`` from ``@v3`` to ``@v4`` and
      ``actions/setup-python`` from ``@v4`` to ``@v5`` in the deploy
      workflow's sdist, gpu-build-cuda11, and gpu-build-cuda12 jobs.
      Other workflows already used the newer action versions.
    * Fixed ``.github/workflows/docs.yml``: the ``tutorials`` job runs on
      ``ubuntu-latest`` but its pip cache pointed at the Windows
      ``~\AppData\Local\pip\Cache`` path (a copy-paste bug that quietly
      disabled caching).  Now uses ``~/.cache/pip``.
